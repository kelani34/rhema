name: Windows Build

# Builds the Windows installer (.exe via NSIS and .msi via WiX) and uploads
# them as workflow artifacts. On a version tag (v*) the installers are also
# attached to a GitHub Release.
#
# Trigger manually from the Actions tab (Run workflow) or by pushing a tag.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create/attach the release on tags

jobs:
  build:
    runs-on: windows-latest

    env:
      # whisper-rs builds via bindgen, which needs libclang.dll from LLVM.
      LIBCLANG_PATH: C:\Program Files\LLVM\bin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to match the Bun that generated bun.lock so --frozen-lockfile
          # stays reproducible across lockfile format changes.
          bun-version: 1.3.2

      - name: Ensure LLVM + CMake (for whisper-rs)
        shell: pwsh
        run: |
          # windows-latest ships LLVM + CMake, but guard against images that don't.
          if (-not (Test-Path "$env:LIBCLANG_PATH\libclang.dll")) {
            Write-Host "libclang.dll not found; installing LLVM via choco..."
            choco install llvm --no-progress -y
          }
          if (-not (Get-Command cmake -ErrorAction SilentlyContinue)) {
            Write-Host "cmake not found; installing via choco..."
            choco install cmake --no-progress -y --installargs 'ADD_CMAKE_TO_PATH=System'
          }
          Write-Host "Using LIBCLANG_PATH=$env:LIBCLANG_PATH"

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # --- Bundled runtime assets (cached so flaky/large downloads only run once) ---

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: models/whisper
          key: whisper-${{ hashFiles('data/download-whisper-model.ts') }}

      - name: Cache NDI SDK
        uses: actions/cache@v4
        with:
          path: sdk/ndi
          key: ndi-${{ hashFiles('data/download-ndi-sdk.ts') }}

      - name: Cache Bible database
        uses: actions/cache@v4
        with:
          path: data/rhema.db
          key: bible-db-${{ hashFiles('data/build-bible-db.ts', 'data/download-sources.ts', 'data/schema.sql') }}

      - name: Download Whisper model (~834MB)
        run: bun run download:whisper

      - name: Download NDI SDK (Windows DLL)
        run: bun run download:ndi-sdk

      - name: Build Bible database
        shell: pwsh
        run: |
          if (-not (Test-Path "data/rhema.db")) {
            bun run download:bible-data
            bun run build:bible
          } else {
            Write-Host "data/rhema.db restored from cache; skipping rebuild."
          }

      # --- Semantic search assets (ONNX model + verse embeddings) ---
      # Generated from scratch on cache miss: HuggingFace export + INT8
      # quantize (Python/optimum) then a Rust precompute over all verses.

      - name: Cache ONNX embedding model
        uses: actions/cache@v4
        with:
          path: |
            models/qwen3-embedding-0.6b
            models/qwen3-embedding-0.6b-int8
          key: onnx-model-${{ hashFiles('data/download-model.ts', 'data/lib/python-env.ts') }}

      - name: Cache Python venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('data/download-model.ts', 'data/lib/python-env.ts') }}

      - name: Cache verse embeddings
        uses: actions/cache@v4
        with:
          path: embeddings
          key: embeddings-${{ hashFiles('data/compute-embeddings.ts', 'data/build-bible-db.ts', 'data/download-model.ts') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export + quantize ONNX embedding model
        shell: pwsh
        run: |
          if (-not (Test-Path "models/qwen3-embedding-0.6b-int8/model_quantized.onnx")) {
            bun run download:model
          } else {
            Write-Host "INT8 ONNX model restored from cache; skipping export."
          }
          # The app reads the tokenizer from the INT8 dir; ensure it's present.
          $int8Tok = "models/qwen3-embedding-0.6b-int8/tokenizer.json"
          $fp32Tok = "models/qwen3-embedding-0.6b/tokenizer.json"
          if ((-not (Test-Path $int8Tok)) -and (Test-Path $fp32Tok)) {
            Copy-Item $fp32Tok $int8Tok
            Write-Host "Copied tokenizer.json into INT8 dir."
          }

      - name: Pre-compute verse embeddings
        shell: pwsh
        run: |
          if (-not (Test-Path "embeddings/kjv-qwen3-0.6b.bin")) {
            bun run export:verses
            bun run precompute:embeddings
          } else {
            Write-Host "Verse embeddings restored from cache; skipping precompute."
          }

      - name: Verify bundled resources exist
        shell: pwsh
        run: |
          $required = @(
            "data/rhema.db",
            "models/whisper/ggml-large-v3-turbo-q8_0.bin",
            "models/qwen3-embedding-0.6b-int8/model_quantized.onnx",
            "models/qwen3-embedding-0.6b-int8/tokenizer.json",
            "embeddings/kjv-qwen3-0.6b.bin",
            "embeddings/kjv-qwen3-0.6b-ids.bin",
            "sdk/ndi/windows/Processing.NDI.Lib.x64.dll"
          )
          foreach ($f in $required) {
            if (-not (Test-Path $f)) { throw "Missing bundled resource: $f" }
            Write-Host "OK: $f"
          }

      # --- Build the installers ---

      - name: Build Tauri app
        run: bun run tauri build

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rhema-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Attach installers to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
